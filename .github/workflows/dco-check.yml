
name: dco-check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: verify Signed-off-by on all PR commits
    runs-on: ubuntu-latest
    steps:
      - name: checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: verify DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r sha; do
              if ! git log -1 --format=%B "$sha" \
                   | grep -qE '^Signed-off-by: .+ <[^@>]+@[^>]+>$'; then
                  subject="$(git log -1 --format=%s "$sha")"
                  echo "::error::commit $sha missing Signed-off-by trailer (DCO)"
                  echo "  subject: $subject"
                  missing=$((missing + 1))
              fi
          done < <(git log --format=%H "${BASE_SHA}..${HEAD_SHA}")

          if [ "$missing" -gt 0 ]; then
              echo ""
              echo "DCO sign-off required on $missing commit(s)."
              echo "Add via:"
              echo "  git commit --amend -s --no-edit         # most recent commit"
              echo "  git rebase --signoff <base>             # whole branch"
              echo "Or use 'git commit -s' going forward."
              echo "Reference: https://developercertificate.org/"
              exit 1
          fi
          echo "all PR commits carry DCO sign-off ($(git rev-list --count "${BASE_SHA}..${HEAD_SHA}") inspected)."
