version: 2
project_name: zen-swarm

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: zen
    main: ./cmd/zen
    binary: zen
    env:
      - CGO_ENABLED=1
    goos: [darwin, linux]
    goarch: [arm64, amd64]
    ignore:
      - goos: darwin
        goarch: amd64
    flags:
      - -trimpath
      - -tags=sqlite_fts5
    ldflags:
      - -s -w -buildid=
      - -X github.com/ncruces/go-sqlite3/driver.driverName=sqlite3_ncruces
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.version={{.Version}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.commit={{.Commit}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.date={{.CommitDate}}
    mod_timestamp: '{{ .CommitTimestamp }}'

  - id: zen-swarm-ctld
    main: ./cmd/zen-swarm-ctld
    binary: zen-swarm-ctld
    env:
      - CGO_ENABLED=1
    goos: [darwin, linux]
    goarch: [arm64, amd64]
    ignore:
      - goos: darwin
        goarch: amd64
    flags:
      - -trimpath
      - -tags=sqlite_fts5
    ldflags:
      - -s -w -buildid=
      - -X github.com/ncruces/go-sqlite3/driver.driverName=sqlite3_ncruces
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.version={{.Version}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.commit={{.Commit}}
      - -X github.com/cbip-solutions/hades-system/internal/buildinfo.date={{.CommitDate}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    builds: [zen, zen-swarm-ctld]
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    formats: [tar.gz]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
    wrap_in_directory: '{{ .ProjectName }}-{{ .Version }}'

checksum:
  name_template: '{{ .ProjectName }}-{{ .Version }}-checksums.txt'
  algorithm: sha256

signs:
  - id: macos-ad-hoc
    cmd: codesign
    args:
      - --sign
      - "-"             # ad-hoc identity (no Developer ID)
      - --force         # overwrite any existing signature (re-snapshot-friendly)
      - --options=runtime  # hardened runtime flag (Apple Silicon stability)
      - --timestamp=none   # no timestamp server (Apple Dev ID would require this)
      - '${artifact}'
    ids: [zen, zen-swarm-ctld]
    artifacts: binary    # NOT "archive"; sign binaries directly
    if: '{{ eq .Os "darwin" }}'
    signature: ''        # codesign embeds signature in binary; no separate .sig

  - id: cosign-keyless
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature
      - '${signature}'
      - --output-certificate
      - '${certificate}'
      - '${artifact}'
    artifacts: archive
    env:
      - COSIGN_EXPERIMENTAL=1

  - id: cosign-keyless-checksum
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature
      - '${signature}'
      - --output-certificate
      - '${certificate}'
      - '${artifact}'
    artifacts: checksum
    env:
      - COSIGN_EXPERIMENTAL=1

  - id: cosign-keyless-sbom
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature
      - '${signature}'
      - --output-certificate
      - '${certificate}'
      - '${artifact}'
    artifacts: sbom
    env:
      - COSIGN_EXPERIMENTAL=1

sboms:
  - id: cyclonedx
    artifacts: archive
    cmd: syft
    args:
      - scan
      - '${artifact}'
      - '--output'
      - 'cyclonedx-json={{ .Path }}.cdx.json'

  - id: spdx-dual-emit
    artifacts: archive
    cmd: bash
    args:
      - "-c"
      - "syft convert ${artifact}.cdx.json -o spdx-json=${artifact}.spdx.json"
    documents:
      - '{{ .ArtifactName }}.spdx.json'

after:
  hooks:
    - cmd: bash scripts/sbom-merge-supplement.sh
      env:
        - 'SUPPLEMENT=configs/cgo-supplement.cdx.json'
      output: true

nfpms:
  - id: linux-packages
    package_name: zen-swarm
    file_name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    builds: [zen, zen-swarm-ctld]
    vendor: hades-system
    homepage: https://github.com/cbip-solutions/hades-system
    maintainer: hades-dev <hades-dev@proton.me>
    description: Multi-project agentic development orchestrator
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/local/bin
    section: utils
    priority: optional
    contents:
      - src: LICENSE
        dst: /usr/share/doc/zen-swarm/LICENSE
      - src: README.md
        dst: /usr/share/doc/zen-swarm/README.md

brews:
  - name: hades
    repository:
      owner: cbip-solutions
      name: homebrew-tap
      branch: main
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    directory: Formula
    homepage: https://github.com/cbip-solutions/hades-system
    description: Multi-project agentic development orchestrator
    license: MIT
    dependencies:
      - name: hermes-agent
        type: required
      - name: tmux
        type: recommended
    test: |
      system "#{bin}/zen", "--version"
      system "#{bin}/zen-swarm-ctld", "--version"
    caveats: |
      HADES system requires Hermes Agent (MIT) as its substrate and recommends
      tmux (Plan 7 multi-project sessions). Code-graph functionality ships
      in-tree via Caronte, the sovereign Go code-graph engine, with no
      external code-graph dependency.

      Daemon (zen-swarm-ctld) is installed as a CLI binary; register the launchd
      LaunchAgent with:

        zen daemon install

      Verify daemon + dependencies with:

        zen doctor

      Default LLM access is the Plan 16 paygo provider cascade (Anthropic API +
      Gemini + OpenRouter):

        zen providers add anthropic --key $ANTHROPIC_API_KEY
        zen providers add gemini    --key $GEMINI_API_KEY
        zen providers add openrouter --key $OPENROUTER_API_KEY

      API keys store via macOS Keychain. Optional advanced configuration: a
      private Tier 1 sidecar can be attached for direct Anthropic Max
      subscription integration; see the HTTP API contract handbook.

      Hermes plugin (zen-swarm plugin contents) loads automatically when
      hermes-agent CLI starts in a project with a Hermes config; verify via:

        hermes plugin list | grep zen-swarm

      License: MIT (decisión 15). See
      https://github.com/cbip-solutions/hades-system/blob/main/README.md for the
      full onboarding flow.

release:
  github:
    owner: cbip-solutions
    name: hades-system
  draft: false
  prerelease: auto  # rc / beta / alpha tags trigger prerelease=true
  mode: replace     # idempotent re-release (overwrite assets on tag re-push)
  header: |

    Multi-project agentic development orchestrator. See [CHANGELOG.md](CHANGELOG.md)
    for the full per-package release-note breakdown.


    ```bash
    gh attestation verify ./zen-swarm-{{ .Version }}-darwin-arm64.tar.gz --repo cbip-solutions/hades-system
    cosign verify-blob \
      --certificate-identity-regexp "https://github.com/cbip-solutions/hades-system/.github/workflows/release.yml@.*" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --signature zen-swarm-{{ .Version }}-darwin-arm64.tar.gz.sig \
      --certificate zen-swarm-{{ .Version }}-darwin-arm64.tar.gz.pem \
      zen-swarm-{{ .Version }}-darwin-arm64.tar.gz
    ```

    Docker:

    ```bash
    docker pull ghcr.io/cbip-solutions/hades-system:{{ .Version }}
    cosign verify ghcr.io/cbip-solutions/hades-system:{{ .Version }} \
      --certificate-identity-regexp "https://github.com/cbip-solutions/hades-system/.github/workflows/release.yml@.*" \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com
    ```
  footer: |
    Full provenance via Rekor transparency log:
    https://search.sigstore.dev/

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^chore\(release\):'
      - '^docs\(handoff\):'
      - 'Merge pull request'
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??:.+$'
      order: 2
    - title: Other
      order: 999

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'

dist: dist
