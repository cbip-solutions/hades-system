id: no-panic-in-prod-paths
language: go
rule:
  any:
    - all:
        - pattern: 'panic($A)'
        - has:
            kind: interpreted_string_literal
            regex: '(?i)not[ _]impl(emented)?( yet)?|todo|unimplemented'
message: |
  Bare panic() with stub-marker message in production code.
  This rule provides Layer A textual scan-time defense; subsumed by nostub
  analyzer at AST level. Replace with real implementation per CLAUDE.md
  "No stubs, código completo" doctrine, OR remove the panic if it was a
  scaffolding leftover.
severity: warning
files:
  - "**/*.go"
ignores:
  - "**/*_test.go"
  - "**/testdata/**"
