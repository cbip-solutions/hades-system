id: no-claude-attribution
language: go
rule:
  kind: comment
  any:
    - regex: '^//\s*(?i)co-authored-by:\s*claude'
    - regex: '^//\s*(?i)generated\s+with\s+claude'
    - regex: '^//\s*(?i)generated\s+by\s+claude'
message: |
  Claude attribution is FORBIDDEN per CLAUDE.md hard rule + inv-zen-004.
  Never include "Co-Authored-By: prohibited assistant" or "Generated with prohibited assistant" as a
  bare line in:
    - Code files (this rule + ast-grep scan)
    - Commit messages (caught by conventional_commit analyzer at subject level)
    - Documentation (caught by markdown variant of this rule, see -markdown lint)
  Remove the line before commit. If the operator added attribution by mistake,
  amend the commit (git commit --amend) before push. Quoted references to the
  strings (e.g., regex documentation) are NOT matched by this rule.
severity: error
files:
  - "**/*.go"
ignores:
  - "**/testdata/**"
