
name: no-missing-spdx-header
description: |
  Every production .go/.py/.sh file must declare
  `SPDX-License-Identifier: MIT` within the first 10 lines (inv-zen-287).
  Remediation: `scripts/insert_spdx_headers.sh` (idempotent bulk inserter).
severity: error
canonical_test: tests/compliance/inv_zen_287_spdx_headers_test.go
remediation_tool: scripts/insert_spdx_headers.sh
include:
  - 'cmd/**/*.go'
  - 'internal/**/*.go'
  - 'plugin/**/*.go'
  - 'plugin/**/*.py'
  - 'mcp/**/*.go'
  - 'mcp/**/*.py'
  - 'scripts/**/*.sh'
  - 'tools/**/*.go'
  - 'tools/**/*.py'
  - 'tests/**/*.go'
exclude:
  - 'vendor/**'
  - 'node_modules/**'
  - 'bin/**'
  - 'dist/**'
  - 'build/**'
  - '**/*_test.go'
  - '**/generated*.go'
  - '**/zz_generated*.go'
  - 'private-tier1-module/**'
  - '**/testdata/**'
required_pattern: 'SPDX-License-Identifier:\s*MIT'
position_constraint: 'within_first_10_lines'
