syntax = "proto3";

package events.v1;

option go_package = "github.com/zen-swarm/example/events/v1;eventsv1";

service EventBus {
  // Server-streaming.
  rpc Subscribe (SubscribeRequest) returns (stream Event);
  // Client-streaming.
  rpc Publish (stream Event) returns (PublishResponse);
  // Bidirectional streaming.
  rpc Chat (stream ChatMessage) returns (stream ChatMessage);
}

message SubscribeRequest { string topic = 1; }
message Event { string id = 1; bytes payload = 2; }
message PublishResponse { int64 published = 1; }
message ChatMessage { string from = 1; string text = 2; }
