syntax = "proto3";

package auth.v1;

option go_package = "github.com/hades-system/example/auth/v1;authv1";

service AuthService {
  rpc Login    (LoginRequest)    returns (LoginResponse);
  rpc Logout   (LogoutRequest)   returns (LogoutResponse);
  rpc Refresh  (RefreshRequest)  returns (RefreshResponse);
  rpc Verify   (VerifyRequest)   returns (VerifyResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Forgot   (ForgotRequest)   returns (ForgotResponse);
}

message LoginRequest    { string username = 1; string password = 2; }
message LoginResponse   { string token = 1; }
message LogoutRequest   { string token = 1; }
message LogoutResponse  { bool ok = 1; }
message RefreshRequest  { string refresh_token = 1; }
message RefreshResponse { string token = 1; }
message VerifyRequest   { string token = 1; }
message VerifyResponse  { bool ok = 1; }
message RegisterRequest { string username = 1; string password = 2; }
message RegisterResponse{ string id = 1; }
message ForgotRequest   { string email = 1; }
message ForgotResponse  { bool sent = 1; }
