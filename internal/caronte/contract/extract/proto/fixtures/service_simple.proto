syntax = "proto3";

package auth.v1;

option go_package = "github.com/hades-system/example/auth/v1;authv1";

service UserService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  string id = 1;
  string name = 2;
}
