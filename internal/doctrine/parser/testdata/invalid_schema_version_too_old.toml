# Edge case: schema_version older than N-1 (current=1.0, N-1=0.9).
# ExtractSchemaVersion returns the literal "0.5" + nil; the caller
# (daemon startup) compares against CurrentSchemaVersion + N-1 and emits
# F20 DoctrineLoadRefused. Phase B does NOT enforce the policy; it only
# returns the value. Policy enforcement = caller responsibility (Q15 A).
schema_version = "0.5"
doctrine_version = "0.5.0"
