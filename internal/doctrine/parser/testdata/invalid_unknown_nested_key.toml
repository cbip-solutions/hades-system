# Strict-mode fixture: nested key under a known section that v1.Schema
# does not declare. Operator typo: "no_tech_dept" instead of "no_tech_debt".
# ParseStrict MUST reject so the operator notices the typo before the
# daemon proceeds with default values.
schema_version = "1.0"
doctrine_version = "1.0.0"

[doctrine_transverse]
no_tech_debt = true
no_stubs = true
build_final_product = true
no_defer = true
no_tech_dept = false   # typo (extra "p" — would silently override real key)
