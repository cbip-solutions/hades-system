# internal/doctrine/builtin/max-scope.toml
#
# hades-system built-in doctrine: max-scope.
#
# Doctrine principle: full codification, build the final product, no defer,
# no tech debt, no stubs. The "max scope always" lens applies to every
# decision; under-engineering today is tech debt taken in advance against
# a worse future self.
#
# release track R1-R5 ack values for max-scope come from
# design records release design (operator-acked
# 2026-05-08, locked into tests/doctrine/reconciliation_test.go as golden
# corpus).
#
# Edits to this file MUST be accompanied by an updated
# tests/doctrine/reconciliation_test.go entry AND an ADR per HADES design Q10 C
# amendment proposal flow. Do NOT bypass the golden corpus + ADR workflow.

schema_version = "1.0"
doctrine_version = "1.0.0"
auto_upgrade = "patch"

# ──────────────────────────────────────────────────────────────────────────
# Doctrine transverse axioms — Q3 C Tier 1 + invariant
# Hardcoded operator-only. User TOML attempting override REJECTED at parse.
# ──────────────────────────────────────────────────────────────────────────

[doctrine_transverse]
no_tech_debt = true
no_stubs = true
build_final_product = true
no_defer = true

# ──────────────────────────────────────────────────────────────────────────
# Workforce — system-design §7.2 + ADR-0004
# Bounds describe the swarm shape: depth (orchestrator → team-lead →
# worker → reviewer-tactical) and width per layer.
# max-scope: depth 1..4, width 8 (open-ended).
# ──────────────────────────────────────────────────────────────────────────

[workforce]
min_depth = 1
max_depth = 4
max_width_per_layer = 8

[workforce.recovery]
# HADES design Q7 D failure-class taxonomy + retry budget.
transient_retry_budget = 5
permanent_infra_escalate = "operator-notify"
doctrine_retry_budget = 3

# ──────────────────────────────────────────────────────────────────────────
# HRA (Hierarchical Reviewer Assignment) — ADR-0005
# max-scope: all 3 layers active; tightest cadence; 1:1 reviewer:worker.
# ──────────────────────────────────────────────────────────────────────────

[hra]
layers_enabled = [1, 2, 3]
cadence_tactical_min = 5
cadence_strategic_min = 30
cadence_architectural_min = 240
reviewer_to_worker_ratio = 1

# ──────────────────────────────────────────────────────────────────────────
# Research — HADES design RAG hybrid + ADR-0006 SOTA orchestrator-enforced
# max-scope: enabled with generous budget; SOTA enforcement on.
# ──────────────────────────────────────────────────────────────────────────

[research]
enabled = true
max_budget_per_session_usd = 50
sota_orchestrator_enforced = true

# ──────────────────────────────────────────────────────────────────────────
# Gates — test tier enable + coverage thresholds
# release track R3 ack — max-scope: full 10-tier coverage.
# ──────────────────────────────────────────────────────────────────────────

[gates]
coverage_min_pct = 90

[gates.test_tiers]
enabled = ["unit", "integration", "adversarial", "chaos", "realworld",
           "compliance", "replay", "timeaccel", "orchestrator_chaos",
           "analysistest"]

# ──────────────────────────────────────────────────────────────────────────
# Review — code-review rotation + Hive cadence
# max-scope: tight Hive cadence; rotate reviewer every PR; dual review on.
# ──────────────────────────────────────────────────────────────────────────

[review]
hive_cadence_min = 30
rotate_reviewer_every_pr = 1
require_dual_review = true

# ──────────────────────────────────────────────────────────────────────────
# Autonomy — HADES design Q6 D + Q8 B + Q9 D + Q11 C + Q13 D
# max-scope: agent mode (operator-confirmed gates only; remaining
# decisions autonomous); strict --check.
# ──────────────────────────────────────────────────────────────────────────

[autonomy]
mode = "agent"
check_mode = "strict"
amendment_cooldown_hours = 24

[autonomy.confirmation_policy]
# release track R1 ack — max-scope: all "high" (HADES design Q6 D pre-acked).
budget_breach_threshold = "high"
spec_amendment_proposal = "high"
invariant_violation = "high"
architectural_review_escalation = "high"

[autonomy.voting]
# release track R2 ack — max-scope: full voting stack.
plurality_threshold_pct = 50
fmv_enable = true
ems_enable = true

[autonomy.cost_degradation]
# HADES design Q9 D — sliding cost thresholds. max-scope: generous bounds;
# downshift-tier rather than abort to keep work flowing.
soft_check_usd = 20
hard_stop_usd = 100
degrade_strategy = "downshift-tier"

# ──────────────────────────────────────────────────────────────────────────
# Merge — HADES design Q4 B + Q13 D scoring + Q7 B Mode enum + §2.5 doctrine
# max-scope: balanced mode; broad candidate fan-out (5).
# ──────────────────────────────────────────────────────────────────────────

[merge]
mode = "balanced"
anomaly_threshold_pct = 30
anomaly_window_min = 60
max_candidates = 5

[merge.scoring_weights]
# HADES design Q4 B per-axis weights — sum MUST equal 100 (CFI invariant).
test_pass = 40
lint_pass = 15
coverage = 25
diff_size = 10
duration = 10

# ──────────────────────────────────────────────────────────────────────────
# Caronte — HADES design in-daemon code-graph engine; balanced branch policy;
# HRA review on.
# ──────────────────────────────────────────────────────────────────────────

[caronte]
branch_policy = "balanced"
hra_review_enabled = true

# ──────────────────────────────────────────────────────────────────────────
# Notifications — HADES design Q12 B severity per-doctrine variation (R4)
# max-scope: strict tier (urgent always interrupts; action-needed respects
# quiet hours; info-immediate queues during quiet).
# ──────────────────────────────────────────────────────────────────────────

[notifications]
quiet_hours_start = "22:00"
quiet_hours_end = "07:00"

[notifications.severity_per_doctrine]
# release track R4 ack — max-scope: strict tier.
action_needed_promotes_to_urgent = false
urgent_bypasses_quiet_hours = true
info_immediate_during_quiet = "queue"

# ──────────────────────────────────────────────────────────────────────────
# hades day cadence — HADES design Q13 C (R5 per-doctrine variation)
# max-scope: twice-daily Mon-Fri 08/18 with 2h catch-up window (narrow).
# ──────────────────────────────────────────────────────────────────────────

[hades_day_cadence]
# release track R5 ack — max-scope: twice-daily, narrow catch-up.
morning_brief_cron = "0 8 * * 1-5"
morning_brief_if_within_hours = 2
eod_digest_cron = "0 18 * * 1-5"
eod_digest_if_within_hours = 2

# ──────────────────────────────────────────────────────────────────────────
# Quota — HADES design Q4 C per-project quota
# max-scope: open-ended within Workforce capacity (4*8=32 max concurrent).
# ──────────────────────────────────────────────────────────────────────────

[quota]
max_concurrent_tasks = 32
max_daily_budget_usd = 200
max_storage_gb = 100

# ──────────────────────────────────────────────────────────────────────────
# Tmux — HADES design Q7 D tmux idle TTL
# max-scope: long-lived sessions (24h idle TTL); auto-reap on.
# ──────────────────────────────────────────────────────────────────────────

[tmux]
idle_ttl_min = 1440
auto_reap = true

# ──────────────────────────────────────────────────────────────────────────
# Scheduling — HADES design Q9 C miss-policy
# max-scope: catchup-bounded; recover up to 24 missed jobs.
# ──────────────────────────────────────────────────────────────────────────

[scheduling]
miss_policy = "catchup-bounded"
miss_catchup_max_jobs = 24

# ──────────────────────────────────────────────────────────────────────────
# WFQ (Weighted Fair Queueing) — HADES design Q10 D
# max-scope: project weight 100 (above default 50); long starvation guard;
# overcommit policy = degrade.
# ──────────────────────────────────────────────────────────────────────────

[wfq]
project_weight_default = 100
starvation_guard_sec = 600
overcommit_policy = "degrade"

# ──────────────────────────────────────────────────────────────────────────
# Knowledge — Q16 C knowledge-base cadence + autonomous-dev infra
# max-scope: hourly Hive doc cadence; cross-project aggregator on.
# ──────────────────────────────────────────────────────────────────────────

[knowledge]
hive_doc_cadence_hours = 1
obsidian_vault_path = "~/Obsidian/hades-system-max-scope"
cross_project_aggregator_enabled = true

# ──────────────────────────────────────────────────────────────────────────
# Gateway — HADES design release track mcpgateway RBAC deny list (Q1=B + invariant)
# max-scope: no tools disabled — agentic deep research + caronte permitted
# (max-scope doctrine intentionally allows the widest tool surface).
# ──────────────────────────────────────────────────────────────────────────

[gateway]
disabled_tools = []

# ──────────────────────────────────────────────────────────────────────────
# Augmentation — HADES design release track 5-lane RRF knobs (Q2=C + Q3=C + Q8=C)
# max-scope: full enable + aggressive 25k tokens + 2s timeout + opt-in
# cross-project scope.
# ──────────────────────────────────────────────────────────────────────────

[augmentation]
enable = true
max_kg_tokens = 25000
timeout_ms = 2000
on_timeout = "graceful_truncate"
cross_project_scope = "opt-in"

# ──────────────────────────────────────────────────────────────────────────
# Renderers — HADES design release track M-5 platform-renderer enable matrix.
# max-scope: all 7 platforms enabled. Replaces hardcoded
# _DOCTRINE_ENABLED matrix in plugin/hades-system/renderers/__init__.py.
# ──────────────────────────────────────────────────────────────────────────

[renderers]
enabled_platforms = ["ink", "telegram", "slack", "email", "voice", "web", "markdown_fallback"]
voice_tts_enabled = true
