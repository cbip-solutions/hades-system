# capa-firewall doctrine: tightest posture.
# Immutable archives + cascade halt + cryptographic attribution.
# Refs spec §1 Q4 B + inv-zen-146 + Plan 9 Phase J-5.

[audit.tessera]
batch_max_age = "1s"
batch_max_size = 100

[audit.backup]
litestream = "continuous"
tessera_rsync = "nightly"
cold_archive_immutable = true

[audit.tamper_response]
mode = "cascade-halt-all"

[audit.witness]
rotation_cadence_days = 90

[research.cache]
revalidation = "eager-on-hit"
cryptographic_attribution = true

[knowledge.aggregator]
promote_required_reason = true

[knowledge.embed]
model = "mpnet-base-v2"
backend = "auto"
