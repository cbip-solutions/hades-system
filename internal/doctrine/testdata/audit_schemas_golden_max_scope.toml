# max-scope doctrine: Plan 9 audit + research + knowledge slices
# Tighter than default: frequent flush, continuous streaming, shorter rotation.
# Refs spec §1 Q4 B + Q5 A + Q6 C + Q8 A + Plan 9 Phase J-5.

[audit.tessera]
batch_max_age = "1s"
batch_max_size = 100

[audit.backup]
litestream = "continuous"
tessera_rsync = "nightly"
cold_archive_immutable = false

[audit.tamper_response]
mode = "halt-per-project"

[audit.witness]
rotation_cadence_days = 90

[research.cache]
revalidation = "eager-on-hit"
cryptographic_attribution = false

[knowledge.aggregator]
promote_required_reason = true

[knowledge.embed]
model = "mpnet-base-v2"
backend = "auto"
