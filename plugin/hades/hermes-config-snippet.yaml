
mcp_servers:
  hades-mcp-research:
    command: hades-mcp-research
    args: []
    description: |
      HADES research MCP: fan-out parallel search + agentic_deep_research
      + caronte engine code-graph (in-process; HADES design sovereignty).
    env:
      HADES_DAEMON_SOCKET: "${HADES_DAEMON_SOCKET:-/tmp/hades-system.sock}"

  hades-mcp-budget:
    command: hades-mcp-budget
    args: []
    description: |
      HADES budget MCP: 4-axis attribution (caller/project/agent/
      augmentation) + z-score anomaly + hierarchical hard-pause cascade
      (per HADES design Q6=C).
    env:
      HADES_DAEMON_SOCKET: "${HADES_DAEMON_SOCKET:-/tmp/hades-system.sock}"

  hades-mcp-audit:
    command: hades-mcp-audit
    args: []
    description: |
      HADES audit MCP: audit_review with cross-provider family-disjoint
      reviewer enforcement + Tessera-anchored audit chain integration
      (per HADES design Q7=D, HADES design).
    env:
      HADES_DAEMON_SOCKET: "${HADES_DAEMON_SOCKET:-/tmp/hades-system.sock}"

  hades-mcp-sshexec:
    command: hades-mcp-sshexec
    args: []
    description: |
      HADES ssh-exec MCP: production-grade remote execution with
      per-project allowlist + streaming logs + idempotency token registry
      (per HADES design Q8=C).
    env:
      HADES_DAEMON_SOCKET: "${HADES_DAEMON_SOCKET:-/tmp/hades-system.sock}"
